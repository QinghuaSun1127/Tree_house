<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 树洞伴侣</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .summary-btn {
            background-color: white;
            color: #4CAF50;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
        }

        .summary-btn:hover { background-color: #f0f0f0; }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #fafafa;
        }

        /* --- 消息容器与头像样式 --- */
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
        }
        .user-wrapper { flex-direction: row-reverse; }
        .ai-wrapper { flex-direction: row; }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            background-color: #eee;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .ai-avatar { background-color: #e8f5e9; }
        .user-avatar { background-color: #e3f2fd; }

        /* --- 气泡样式优化 --- */
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 0.95em;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #dcf8c6;
            border-top-right-radius: 2px;
        }
        .ai-message {
            background-color: #ffffff;
            border: 1px solid #eee;
            border-top-left-radius: 2px;
        }

        /* --- 快捷引导气泡样式 --- */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
            margin-left: 46px; 
        }
        .quick-btn {
            background-color: #fff;
            border: 1px solid #4CAF50;
            color: #4CAF50;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background-color: #4CAF50;
            color: #fff;
        }

        .summary-message {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            align-self: center;
            width: 90%;
            text-align: center;
            font-size: 0.9em;
            border-radius: 10px;
        }

        /* --- 底部输入区样式 --- */
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }

        button.send-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button.upload-btn {
            background-color: #f0f2f5;
            color: #555;
            border: 1px solid #ccc;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
            padding: 0;
            flex-shrink: 0; 
            border-radius: 50%;
            cursor: pointer;
            margin-right: 8px;
            font-size: 20px;
            outline: none;
        }
        button.upload-btn:hover { background-color: #e4e6e9; }

        /* 录音呼吸灯动画 */
        .recording {
            background-color: #ffcccc !important; 
            color: red !important;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>🌳 我的专属树洞</span>
            <button class="summary-btn" onclick="getSummary()">生成今日情绪卡</button>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message-wrapper ai-wrapper">
                <div class="avatar ai-avatar">🌳</div>
                <div class="message ai-message">
                    你好呀！我是你的专属树洞精灵『小树』✨<br>
                    你可以随时对我吐苦水、分享开心事，也可以发照片给我看哦（点击下方相机图标）。<br>
                    今天想聊点什么呢？
                </div>
            </div>
            <div class="quick-replies" id="quickReplies">
                <button class="quick-btn" onclick="sendQuickReply('哎，我今天真的好累哦😔')">今天好累哦 😔</button>
                <button class="quick-btn" onclick="sendQuickReply('遇到一件超开心的事情！✨')">分享开心事 ✨</button>
                <button class="quick-btn" onclick="document.getElementById('imageInput').click()">发张照片看看 📷</button>
            </div>
        </div>

        <div id="imagePreviewContainer" style="display: none; padding: 0 15px 10px; background: white;">
            <img id="imagePreview" style="max-height: 60px; border-radius: 8px; border: 1px solid #ccc;">
            <span style="cursor:pointer; color:red; margin-left:10px;" onclick="clearImage()">✖ 取消图片</span>
        </div>

        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage()">
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📷</button>
            <button class="upload-btn" id="micBtn" onclick="toggleVoice()" title="点击开始/停止说话">🎤</button>
            <input type="text" id="userInput" placeholder="写下你的情绪，或发张照片..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // === 1. 全局变量区（必须在最前面） ===
        let fullChatHistory = "";
        let currentImageDataUrl = null; 
        let recognition;
        let isRecording = false;

        // === 2. 语音引擎初始化 ===
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.interimResults = false; 
            recognition.lang = 'zh-CN'; 

            recognition.onstart = function () {
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('userInput').placeholder = "正在倾听，请说话...";
            };

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value += transcript;
            };

            recognition.onerror = function (event) {
                if (event.error === 'not-allowed') {
                    alert("无法录音，请在浏览器地址栏左侧允许麦克风权限！");
                }
            };

            recognition.onend = function () {
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('
