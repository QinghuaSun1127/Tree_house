<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 树洞伴侣</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            line-height: 1.4;
            font-size: 0.95em;
        }

        .user-message {
            background-color: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .ai-message {
            background-color: #ffffff;
            border: 1px solid #eee;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 0.95em;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">🌳 我的专属树洞</div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">你好，我是你的树洞。今天过得怎么样？有什么烦心事都可以对我说哦。</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="写下你的情绪..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const text = inputField.value.trim();

            if (!text) return; // 如果为空就不发送

            // 1. 把用户的话显示在界面上
            chatBox.innerHTML += `<div class="message user-message">${text}</div>`;
            inputField.value = ''; // 清空输入框
            chatBox.scrollTop = chatBox.scrollHeight; // 自动滚动到底部

            // 显示一个“正在思考”的占位符
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div class="message ai-message" id="${loadingId}">树洞正在倾听...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 2. 向你的 Python 服务器发送网络请求！
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                // 3. 把 AI 的回复替换掉“正在思考”
                document.getElementById(loadingId).innerText = data.reply;
            } catch (error) {
                document.getElementById(loadingId).innerText = "（哎呀，树洞似乎开小差了，请检查后端服务器是否运行）";
                console.error(error);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>

</body>

</html>
