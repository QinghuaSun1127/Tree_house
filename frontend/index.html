<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>AI 树洞伴侣</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="小树">

    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div id="pwaBanner" class="pwa-banner">
        <div class="pwa-content">
            <span class="pwa-icon">💡</span>
            <div class="pwa-text">将小树添加到桌面<br><span style="font-size:11px; color:#666;">获取免打扰的全屏沉浸体验</span></div>
        </div>
        <div class="pwa-actions">
            <button id="pwaInstallBtn" class="pwa-btn">安装</button>
            <button id="pwaCloseBtn" class="pwa-close">✖</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <span>🌳 树洞</span>
            <div class="header-btns">
                <button class="summary-btn" id="lockBtn" onclick="toggleSecurity()">🔐 解锁记忆</button>
                <button class="summary-btn" id="newChatBtn" style="display:none;" onclick="startNewChat()">✨ 新局</button>
                <button class="summary-btn" id="exportBtn" style="display:none;" onclick="exportData()">⬇️ 导出</button>
                <button class="summary-btn danger-btn" id="destroyBtn" style="display:none;"
                    onclick="destroyMemory()">🗑️ 擦除</button>
                <button class="summary-btn" id="summaryBtn" onclick="getSummary()">📊 情绪卡</button>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message-wrapper ai-wrapper">
                <div class="avatar ai-avatar">🌳</div>
                <div class="message ai-message">
                    你好呀！我是你的专属树洞精灵『小树』✨<br>
                    <strong>今天想聊点什么呢？随时可以告诉我哦。</strong><br>
                    <span style="font-size: 0.8em; color:#888;">(当前为新对话模式，点击右上角可恢复或保存历史记忆)</span>
                </div>
            </div>
            <div class="quick-replies" id="quickReplies">
                <button class="quick-btn" onclick="sendQuickReply('哎，我今天真的好累哦😔')">今天好累哦 😔</button>
                <button class="quick-btn" onclick="sendQuickReply('遇到一件超开心的事情！✨')">分享开心事 ✨</button>
                <button class="quick-btn" onclick="handleCameraClick()">发张照片看看 📷</button>
            </div>
        </div>

        <div id="imagePreviewContainer" class="image-preview-container" style="display: none;">
            <img id="imagePreview" alt="图片预览">
            <span class="cancel-image-btn" onclick="clearImage()">✖ 取消图片</span>
        </div>

        <div class="input-area">
            <div class="upload-btn-group">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage()">
                <button class="upload-btn" onclick="handleCameraClick()" title="发照片">📷</button>
                <button class="upload-btn" id="micBtn" onclick="toggleVoice()" title="语音输入">🎤</button>
                <button class="upload-btn" id="speakerBtn" onclick="toggleVoiceOutput()" title="语音播报开关">🔊</button>
            </div>
            <input type="text" id="userInput" placeholder="写下情绪或发张照片..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendMsgBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
